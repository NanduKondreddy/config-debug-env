spec_version: 1
name: config-debug-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: An RL environment for training AI agents to debug broken configuration files
version: 1.0.0
author: meta-hackathon-participant
tags:
  - devops
  - configuration
  - debugging
  - infrastructure

action_model: server.models:ConfigDebugAction
observation_model: server.models:ConfigDebugObservation
state_model: server.models:ConfigDebugState

tasks:
  - id: task1_json
    name: JSON Config Debug
    difficulty: easy
    num_bugs: 2
    grader: server.graders.grader_api:Task1Grader
    has_grader: true
  - id: task2_yaml
    name: YAML Config Debug
    difficulty: easy
    num_bugs: 2
    grader: server.graders.grader_api:Task2Grader
    has_grader: true
  - id: task3_dockerfile
    name: Dockerfile Debug
    difficulty: medium
    num_bugs: 3
    grader: server.graders.grader_api:Task3Grader
    has_grader: true
  - id: task4_compose
    name: Docker Compose Debug
    difficulty: medium
    num_bugs: 4
    grader: server.graders.grader_api:Task4Grader
    has_grader: true
  - id: task5_k8s
    name: Kubernetes Config Debug
    difficulty: hard
    num_bugs: 5
    grader: server.graders.grader_api:Task5Grader
    has_grader: true
  - id: task6_github_actions
    name: GitHub Actions Debug
    difficulty: hard
    num_bugs: 5
    grader: server.graders.grader_api:Task6Grader
    has_grader: true
  - id: task7_nginx
    name: Nginx Config Debug
    difficulty: very_hard
    num_bugs: 6
    grader: server.graders.grader_api:Task7Grader
    has_grader: true